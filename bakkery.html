<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family:serif ;
            background-color: #000000;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: rgb(162, 0, 255);
            color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        h2 {
            color:#f135b9;
        }

        .container {
            background-color: #f4f4f4;
            border-radius:10px;
            margin: 20px;
            box-shadow: 0 0 10px gray;
            padding: 20px;
        }


        .items {
            display: flex;
            align-items: center;
            margin: 10px 0 ;
        }

        .price {
            margin-left: auto;
            font-weight: bold;
            color: green;

        }


        footer {
            background-color: rgb(162, 0, 255);
            color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🧁XAVIER'S BAKERY</h1>
        <p>Welcome to our delicious bakery!</p>
    </header>
    <div class="container">
        <h2>🥤BEVERAGES</h2>


        <div class="items">
            <p>Chocolate Cake</p>
            <span class="price">Rs.20</span>
        </div>


        <div class="items">
            <p>Vanilla Cupcakes</p>
            <span class="price">Rs.15</span>
        </div>

        
    </div>

    <div class="container">
            <h2>🥐Puffs items</h2>

        <div class="items">
            <p>Veg Puffs</p>
            <span class="price">Rs.15</span>
        </div>


        <div class="items">
            <p>Egg Puffs</p>
            <span class="price">Rs.15</span>
        </div>
    </div>

    <footer>
        <p>Contact us: 123-456-7890 | Email:barnabasfrancis43@gmail.com</p>
        <p>Follow us on social media: @xaviersbakery</p>    
    </footer>


</body>
</html>
